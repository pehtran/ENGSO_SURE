<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SURE</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="sure.css">
    <!-- VUE -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- ANIME.JS -->
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

    <!-- Highcharts -->
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.1/highcharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.1/highcharts-more.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.1/modules/accessibility.js"></script>
</head>

<body class="main-container">
    <div class="container barlow-regular p-5" id="SUREapp">
        <h1 class="text-center fw-bold display-3">SURE EVALUATION TOOL</h1>

        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="progress mb-4" style="height: 10px;">
                    <div class="progress-bar bg-success" :style="{ width: progress + '%' }"></div>
                </div>

                <div v-for="(q, index) in questions" :key="q.Question_ID">
                    <div v-if="index === currentStep" class="card shadow-sm border-0 question-card">
                        <div class="card-body p-4">
                            <h6 class="text-muted text-uppercase small bg-light p-2 rounded d-inline-block">
                                {{ q.Competency }}
                            </h6>
                            <h4 class="card-title mb-4">{{ q.Question_Text }}</h4>

                            <div class="d-flex justify-content-between">
                                <div v-for="n in 5" :key="n" class="form-check form-check-inline">
                                    <input class="btn-check" type="radio" :name="'q'+index" :id="'q'+index+'n'+n"
                                        :value="n" v-model="q.Result" @change="nextQuestion">
                                    <label class="btn btn-outline-success px-4 py-2 fs-3 fw-bold rounded-5"
                                        :for="'q'+index+'n'+n">
                                        {{ n }}
                                    </label>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between mt-3">
                                <div>Strongly disagree</div>
                                <div>Strongly agree</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-if="currentStep >= questions.length && questions.length > 0" class="text-center">
                    <h2>Your Assessment Results</h2>
                    <figure class="highcharts-figure">
                        <div id="container"></div>
                    </figure>
                    <div v-html="renderResultSummary()"></div>
                    <button class="btn btn-lg fw-bold btn-success mt-3 w-100"
                        @click="reset_form(); currentStep = 0">RESTART</button>
                </div>

            </div>
        </div>




    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="sureVUE.js"></script>

    <script type="module" src="sureANIMATIONS.js"></script>


</body>

</html>
